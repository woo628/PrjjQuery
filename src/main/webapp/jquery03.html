<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
 /* h1,p {color: orange;} */
</style>
<title>Insert title here</title>
<!-- jquery CDN -->
<script src="http://code.jquery.com/jquery-4.0.0.min.js"></script>
<script>
	$(function () {
		$('tr:odd').css('background', '#9F9F9F') // 홀수
		$('tr:even').css('background', '#F9F9F9') // 짝수
		$('tr:first').css({ 					   // 여러개 css 적용할려면 {}필수
			'background-color':'#000000',
			'color':'#FFFFFF'
		})
	})
</script>
</head>
<body>
 <table>
    <tr><th>이름</th><th>혈액형</th><th>지역</th></tr>
    <tr><td>강호동</td><td>AB형</td><td>해운대구</td></tr>
    <tr><td>서장훈</td><td>A형</td><td>동래구</td></tr>
    <tr><td>박세리</td><td>B형</td><td>동래구</td></tr>
    <tr><td>김연아</td><td>A형</td><td>동래구</td></tr>
    <tr><td>박찬호</td><td>A형</td><td>동래구</td></tr>  
  </table>
</body>
</html>
