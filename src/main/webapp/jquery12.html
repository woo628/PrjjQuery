<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>무한 스크롤</title>
<script src="http://code.jquery.com/jquery.min.js"></script>
<style>
  
</style>
<script>
	var n = 0
	$(function () {
		$(window).scroll(function () {
			var scrollHeight = $(window).scrollTop() + $(window).height()
			var documentHeight = $(document).height()
			if (documentHeight - 200 >= scrollHeight) {
				// 추가할 내용	
				for (var i = 0; i < 20; i++) {
					$('body').append('<h1>Infinity scroll' + n + '</h1>')
					n++
				}
			}
		})
		// 초기화면 설정
		for (var i = 0; i < 20; i++) {
				$('body').append('<h1>Infinity scroll' + n + '</h1>')
			}
	})
</script>
</head>
<body>
  
</body>
</html>
