		$('button').on('click', function() { // e = event
			// this = e.target 		this java 객체 이니 jquery 는 ${} 필요
			if ($(this).html() == 'Click Me Show') {

			if ($(this).html() == 'Click Me Hide') {

		// table>tr = <tboby> 그래서 tr이 자식이 아니다
		$('tr').on({
			mouseover : function () {
				$(this).css({ 
					'backgroundColor':'black','color':'white'
				})
			},
			mouseout : function () {
				$(this).css({ 
					'backgroundColor':'white','color':'black'
				})
